<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="本地 JSON 格式互转：CPA / sub2api / Cockpit / 9router / Codex / AxonHub / Codex-Manager。"
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
    <title>AI Auth Bridge</title>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("session-converter-theme");
          const mode = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
          const resolved =
            mode === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : mode;
          document.documentElement.dataset.theme = resolved;
          document.documentElement.dataset.themeMode = mode;
          document.documentElement.style.colorScheme = resolved;
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", resolved === "dark" ? "#0a0a0a" : "#ffffff");
        } catch (_) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
